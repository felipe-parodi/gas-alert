name: Daily gas alert

on:
  schedule:
    # GH Actions cron is UTC and can't express "6 AM Pacific" across DST.
    # Run at both candidate hours; the guard step keeps only the one that
    # lands in the 6 AM Pacific hour.
    - cron: "15 13 * * *"  # 6:15 AM PDT (summer)
    - cron: "15 14 * * *"  # 6:15 AM PST (winter)
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Skip the off-DST duplicate run
        id: guard
        run: |
          hour=$(TZ=America/Los_Angeles date +%-H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$hour" = "6" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: it is ${hour}h Pacific, not 6h"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.run == 'true'

      - uses: astral-sh/setup-uv@v5
        if: steps.guard.outputs.run == 'true'

      - name: Send alert
        if: steps.guard.outputs.run == 'true'
        env:
          CITIES_JSON: ${{ secrets.CITIES_JSON }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMS_TO: ${{ secrets.SMS_TO }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          EXCLUDE_STATIONS: ${{ vars.EXCLUDE_STATIONS }}
          MAPS_APP: ${{ vars.MAPS_APP }}
        run: uv run python -m gas_alert.main
