name: Daily gas alert

on:
  schedule:
    # GH Actions cron is UTC, best-effort, and routinely minutes-to-an-hour
    # late (top-of-hour slots are the most congested), so don't aim at one
    # exact hour. Three attempts, minutes off the hour; the guard step sends
    # once per Pacific day, at or after 10 AM, whichever attempt runs first.
    - cron: "7 17 * * *"  # 10:07 PDT | 09:07 PST (guard skips: before 10)
    - cron: "7 18 * * *"  # 11:07 PDT backstop | 10:07 PST
    - cron: "7 19 * * *"  # 12:07 PDT backstop | 11:07 PST backstop
  workflow_dispatch:

# A delayed run can overlap the next slot; serialize so the second run sees
# the first one's sent-<date> marker and skips instead of double-sending.
concurrency:
  group: daily-gas-alert
  cancel-in-progress: false

permissions:
  actions: write  # schedule keepalive (re-enable workflow)
  contents: read

jobs:
  alert:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Send once per day, at or after 10 AM Pacific
        id: guard
        run: |
          # "Sent today" is tracked as a workflow artifact named sent-<date>:
          # GITHUB_TOKEN can't write repo variables (403), but uploading an
          # artifact needs no API permission and listing needs only
          # actions:read. On a read error, err toward sending — a rare
          # duplicate beats a silent miss.
          today=$(TZ=America/Los_Angeles date +%F)
          hour=$(TZ=America/Los_Angeles date +%-H)
          sent=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?name=sent-$today" -q .total_count 2>/dev/null || echo 0)
          echo "today=$today" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$hour" -ge 10 ] && [ "${sent:-0}" -eq 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: ${hour}h Pacific, sent-today artifacts: ${sent:-0}"
          fi

      - name: Keep the schedule alive
        # Scheduled workflows are auto-disabled after 60 days without repo
        # activity; re-enabling on every trigger resets that clock.
        run: gh api -X PUT "repos/$GITHUB_REPOSITORY/actions/workflows/daily.yml/enable"

      - uses: actions/checkout@v4
        if: steps.guard.outputs.run == 'true'

      - uses: astral-sh/setup-uv@v5
        if: steps.guard.outputs.run == 'true'

      - name: Send alert
        if: steps.guard.outputs.run == 'true'
        env:
          CITIES_JSON: ${{ secrets.CITIES_JSON }}
          ANCHORS_JSON: ${{ secrets.ANCHORS_JSON }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMS_TO: ${{ secrets.SMS_TO }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          EXCLUDE_STATIONS: ${{ vars.EXCLUDE_STATIONS }}
          MAPS_APP: ${{ vars.MAPS_APP }}
        run: uv run python -m gas_alert.main

      - name: Mark today as sent
        # Only reached when the send succeeded — a failed send uploads no
        # marker, so the next cron slot retries automatically.
        if: steps.guard.outputs.run == 'true'
        run: date -u > sent-marker.txt

      - uses: actions/upload-artifact@v4
        if: steps.guard.outputs.run == 'true'
        with:
          name: sent-${{ steps.guard.outputs.today }}
          path: sent-marker.txt
          retention-days: 2
